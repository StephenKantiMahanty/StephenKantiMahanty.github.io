<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Upload - Stephen Kanti Mahanty</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="upload.css">
</head>
<body>
    <div class="section-container upload-page">
        <div class="grid-background"></div>

        <section class="hero-section">
            <div class="component-icon">
                <svg viewBox="0 0 200 80" class="header-component-svg" aria-hidden="true">
                    <rect x="40" y="20" width="120" height="40" rx="6" fill="none" stroke="currentColor" stroke-width="2"/>
                    <path d="M 70 30 L 100 55 L 130 30" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <line x1="100" y1="55" x2="100" y2="22" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
            </div>
            <h1 class="section-title">PRIVATE UPLOAD</h1>
            <p class="section-subtitle">Value: ephemeral | Scope: browser-bound</p>
        </section>

        <section class="content-section">
            <div class="content-wrapper">
                <h2 class="section-heading">UPLOAD IMAGE</h2>
                <div class="section-content-area">
                    <p class="section-description">
                        // Upload an image, open it in a private tab, and let it disappear when you close the viewer.
                    </p>

                    <form class="upload-form" id="upload-form">
                        <label class="upload-dropzone" for="image-input">
                            <input id="image-input" name="image" type="file" accept="image/*" required hidden>
                            <span class="upload-dropzone-title">Choose an image</span>
                            <span class="upload-dropzone-subtitle">PNG, JPG, GIF, WEBP, or other image formats</span>
                        </label>

                        <div class="file-summary" id="file-summary">No file selected.</div>
                        <button class="upload-button" type="submit" id="upload-button">Upload image</button>
                    </form>

                    <div class="preview-panel hidden" id="preview-panel" aria-live="polite">
                        <h3 class="panel-title">Local preview</h3>
                        <img id="preview-image" alt="Local image preview">
                    </div>

                    <div class="result-panel hidden" id="result-panel" aria-live="polite">
                        <h3 class="panel-title">Private links</h3>

                        <div class="link-row">
                            <div>
                                <span class="link-label">Viewer URL</span>
                                <code id="viewer-url" class="link-value"></code>
                            </div>
                            <button class="secondary-button" type="button" data-copy-target="viewer-url">Copy</button>
                        </div>

                        <div class="link-row">
                            <div>
                                <span class="link-label">Image URL</span>
                                <code id="image-url" class="link-value"></code>
                            </div>
                            <button class="secondary-button" type="button" data-copy-target="image-url">Copy</button>
                        </div>

                        <div class="action-row">
                            <button class="secondary-button" type="button" id="open-viewer-button">Open viewer in new tab</button>
                            <button class="secondary-button danger" type="button" id="delete-button">Delete now</button>
                        </div>
                    </div>

                    <p class="status-message" id="status-message" role="status" aria-live="polite"></p>
                </div>
            </div>
        </section>
    </div>

    <script src="upload.js"></script>
</body>
</html>
