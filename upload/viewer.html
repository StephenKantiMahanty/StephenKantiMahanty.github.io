<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Image Viewer - Stephen Kanti Mahanty</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../upload/upload.css">
</head>
<body>
    <div class="section-container upload-page">
        <div class="grid-background"></div>

        <section class="hero-section viewer-hero">
            <div class="component-icon">
                <svg viewBox="0 0 200 80" class="header-component-svg" aria-hidden="true">
                    <rect x="30" y="18" width="140" height="44" rx="8" fill="none" stroke="currentColor" stroke-width="2"/>
                    <circle cx="70" cy="38" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
                    <path d="M 55 55 L 90 30 L 125 52 L 150 38" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1 class="section-title">PRIVATE VIEW</h1>
            <p class="section-subtitle">This tab deletes the upload when it closes</p>
        </section>

        <section class="content-section">
            <div class="content-wrapper viewer-wrapper">
                <div class="section-content-area">
                    <p class="section-description" id="viewer-status">
                        // Loading private image...
                    </p>

                    <div class="viewer-frame">
                        <img id="viewer-image" alt="Private uploaded image" hidden>
                    </div>

                    <div class="action-row viewer-actions">
                        <button class="secondary-button" type="button" id="open-raw-button">Open raw image</button>
                        <button class="secondary-button danger" type="button" id="close-delete-button">Delete and close</button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="../../upload/viewer.js"></script>
</body>
</html>
